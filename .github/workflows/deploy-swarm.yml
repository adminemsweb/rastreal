name: Implantar Rastreall no Swarm

on:
  workflow_run:
    workflows: ["Publicar imagem Docker"]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-rastreall-swarm
  cancel-in-progress: false

jobs:
  implantar:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Baixar projeto
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Configurar chave SSH
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Registrar servidor
        run: ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Enviar stack
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" 'mkdir -p /opt/stacks/rastreall'
          scp deploy/rastreall-stack.yml "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/stacks/rastreall/stack.yml"

      - name: Atualizar serviço
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'docker pull ghcr.io/adminemsweb/rastreal:latest && docker stack deploy --with-registry-auth -c /opt/stacks/rastreall/stack.yml rastreall'

      - name: Confirmar disponibilidade
        run: |
          for attempt in 1 2 3 4 5 6; do
            replicas=$(ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" "docker service ls --filter name=rastreall_web --format '{{.Replicas}}'")
            [ "$replicas" = "1/1" ] && exit 0
            sleep 10
          done
          exit 1
