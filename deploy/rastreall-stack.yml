version: "3.8"

services:
  web:
    image: ghcr.io/adminemsweb/rastreal:latest
    environment:
      APP_NAME: Rastreall
      APP_URL: https://rastreall.com.br
      APP_TIMEZONE: America/Sao_Paulo
      APP_DEBUG: "false"
    volumes:
      - leads:/var/www/html/storage/leads
      - logs:/var/www/html/storage/logs
    networks:
      - traefik_public
    deploy:
      replicas: 1
      update_config:
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.docker.network=traefik_public
        - traefik.http.routers.rastreall.rule=Host(`rastreall.com.br`,`www.rastreall.com.br`)
        - traefik.http.routers.rastreall.entrypoints=websecure
        - traefik.http.routers.rastreall.tls=true
        - traefik.http.routers.rastreall.tls.certresolver=le
        - traefik.http.routers.rastreall.service=rastreall
        - traefik.http.services.rastreall.loadbalancer.server.port=80

volumes:
  leads:
  logs:

networks:
  traefik_public:
    external: true
